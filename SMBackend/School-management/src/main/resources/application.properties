spring.application.name=School-management

server.port=8081
spring.config.import=optional:file:.env[.properties],optional:file:env[.properties]

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

app.upload.dir=${UPLOAD_DIR:uploads}

# JWT auth
app.jwt.secret=${APP_JWT_SECRET:CHANGE_ME_TO_A_LONG_RANDOM_SECRET_AT_LEAST_32_CHARS}
app.jwt.issuer=${APP_JWT_ISSUER:school-management}
app.jwt.ttlMinutes=${APP_JWT_TTL_MINUTES:480}

# LiveKit (self-hosted meeting server - separate server)
app.livekit.apiKey=${APP_LIVEKIT_API_KEY:}
app.livekit.apiSecret=${APP_LIVEKIT_API_SECRET:}
app.livekit.wsUrl=${APP_LIVEKIT_WS_URL:wss://meet.yourdomain.com}
app.livekit.tokenTtlMinutes=${APP_LIVEKIT_TOKEN_TTL_MINUTES:180}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
